name: BankApp CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: adijaiswal/bankapp

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Build Tag
      run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

    # Setup Java
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Cache Maven dependencies
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

    # Compile
    - name: Compile
      run: mvn compile

    # Test
    - name: Run Tests
      run: mvn test

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget -y
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    - name: Checkout code for Trivy scan
      working-directory: src/product-catalog
      run: |
        trivy fs . \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-report.txt \
          --no-progress
    - name: Upload Trivy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-catalog-report
        path: src/

    # SonarQube Scan
    - name: SonarQube Scan
      run: |
        mvn sonar:sonar \
        -Dsonar.projectKey=gcbank \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Build package
    - name: Build Package
      run: mvn package

    # Publish to Nexus
    - name: Publish Artifact to Nexus
      run: mvn deploy
      env:
        NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
        NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

    # Login DockerHub
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t krishna0405/bankapp:$IMAGE_TAG .

    # Scan Docker Image
    - name: Trivy Image Scan
      run: trivy image $IMAGE_NAME:$IMAGE_TAG > image-report.txt

    # Push Docker Image
    - name: Push Docker Image
      run: docker push $IMAGE_NAME:$IMAGE_TAG

    # Update Manifest in CD Repo
    - name: Update Manifest Repo
      run: |
        git clone https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_PASSWORD }}@github.com/jaiswaladi246/Mega-Project-CD.git

        cd Mega-Project-CD

        sed -i "s|adijaiswal/bankapp:.*|adijaiswal/bankapp:${IMAGE_TAG}|" Manifest/manifest.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add Manifest/manifest.yaml
        git commit -m "Update image tag to ${IMAGE_TAG}"
        git push origin main
