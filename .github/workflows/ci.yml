name: BankApp CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: krishna0405/bankapp

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Build Tag
      run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

    # Setup Java
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Cache Maven dependencies
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

    # Compile
    - name: Compile
      run: mvn compile

    # Test
    - name: Run Tests
      run: mvn test

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget -y
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    - name: Checkout code for Trivy scan
      working-directory: src/
      run: |
        trivy fs . \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-report.txt \
          --no-progress
          
    - name: Upload Trivy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-catalog-report
        path: src/

    # SonarQube Scan
    - name: SonarQube Scan
      run: |
        mvn sonar:sonar \
        -Dsonar.projectKey=gcbank \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Build package
    - name: Build Package
      run: mvn package

    # Publish to Nexus
    - name: Upload to Nexus
      run: |
        curl -v -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_TOKEN }} \
        --upload-file target/bankapp-0.0.1-SNAPSHOT.jar \
        ${{ secrets.NEXUS_URL }}/repository/maven-releases/com/bankapp/bankapp/1.0.11/bankapp-1.0.11.jar
    # Login DockerHub
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t krishna0405/bankapp:$IMAGE_TAG .

    # Scan Docker Image
    - name: Trivy Image Scan
      run: trivy image $IMAGE_NAME:$IMAGE_TAG > image-report.txt

    # Push Docker Image
    - name: Push Docker Image
      run: docker push $IMAGE_NAME:$IMAGE_TAG

    # Update Manifest in CD Repo
    - name: Update Manifest Repo
      run: |
        git clone https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_PASSWORD }}@github.com/sks0405/Mega-Project-CD-main.git

        cd Mega-Project-CD-main

        sed -i "s|krishna0405/bankapp:.*|krishna0405/bankapp:${IMAGE_TAG}|" Manifest/manifest.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add Manifest/manifest.yaml
        git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes"
        git push origin main
deploy:
  runs-on: ubuntu-latest
  needs: build

  steps:
  - name: Checkout CD Repo
    uses: actions/checkout@v4
    with:
      repository: sks0405/Mega-Project-CD-main
      token: ${{ secrets.GIT_PASSWORD }}

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    aws-region: ap-south-1

  - name: Configure kubectl for EKS
    run: |
      aws eks update-kubeconfig --region ap-south-1 --name devopsshack-cluster

  - name: Deploy to Kubernetes
    run: |
      kubectl apply -f Manifest/manifest.yaml -n webapps
      kubectl apply -f Manifest/HPA.yaml
      sleep 30
      kubectl get pods -n webapps
      kubectl get svc -n webapps
